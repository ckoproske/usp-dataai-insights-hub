<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Measurement & Insights Dashboard</title>

  <!-- Noto fonts (BMGF brand) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@800;900&family=Noto+Serif:ital,wght@0,300;0,400;0,600;1,300&family=Noto+Serif+Condensed:wght@600&display=swap" rel="stylesheet">

  <!-- React -->
  <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js" crossorigin></script>

  <!-- Babel (JSX transformer) -->
  <script src="https://unpkg.com/@babel/standalone@7.23.5/babel.min.js"></script>

  <!-- Recharts dependencies (must load before Recharts) -->
  <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
  <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js" crossorigin></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Serif', Georgia, serif; background: #F5F3ED; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script>
    fetch("/dashboard.jsx")
      .then(r => {
        if (!r.ok) throw new Error("Could not load dashboard.jsx — HTTP " + r.status);
        return r.text();
      })
      .then(code => {
        const transformed = Babel.transform(code, {
          presets: ["react"],
        }).code;
        eval(transformed);
        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(React.createElement(App));
      })
      .catch(err => {
        document.getElementById("root").innerHTML =
          "<div style='padding:40px;font-family:sans-serif'>" +
          "<h2 style='color:#DC2626;margin-bottom:12px'>Dashboard failed to load</h2>" +
          "<pre style='background:#FEF2F2;padding:16px;border-radius:8px;color:#991B1B;white-space:pre-wrap'>" +
          err.toString() + "</pre>" +
          "<p style='margin-top:16px;color:#6B7280;font-size:14px'>Check the browser console (F12) for more detail.</p>" +
          "</div>";
      });
  </script>
</body>
</html>
