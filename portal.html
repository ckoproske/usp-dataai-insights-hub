<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Measurement & Insights — Data Hub</title>

  <!-- Noto fonts (BMGF brand) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@800;900&family=Noto+Serif:ital,wght@0,300;0,400;0,600;1,300&family=Noto+Serif+Condensed:wght@600&display=swap" rel="stylesheet">

  <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.23.5/babel.min.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #F4F5F7; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    fetch("/portal.jsx")
      .then(r => {
        if (!r.ok) throw new Error("Could not load portal.jsx — HTTP " + r.status);
        return r.text();
      })
      .then(code => {
        const transformed = Babel.transform(code, { presets: ["react"] }).code;
        eval(transformed);
        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(React.createElement(PortalApp));
      })
      .catch(err => {
        document.getElementById("root").innerHTML =
          "<div style='padding:40px;font-family:sans-serif'>" +
          "<h2 style='color:#DC2626;margin-bottom:12px'>Portal failed to load</h2>" +
          "<pre style='background:#FEF2F2;padding:16px;border-radius:8px;color:#991B1B;white-space:pre-wrap'>" +
          err.toString() + "</pre></div>";
      });
  </script>
</body>
</html>
